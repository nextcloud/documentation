# Reusable workflow: build + stage the documentation for a single branch.
#
# Called by:
#   - sphinxbuild.yml  (PR / push CI — builds the current ref)
#   - deploy-docs.yml  (scheduled deploy — builds every version via a matrix)
#
# It builds HTML / ePub / PDF for all manuals, stages them into a per-version
# folder and uploads a single `staged-docs-<branch>` artifact. It does NOT
# touch gh-pages — deployment lives in deploy-docs.yml.
name: "Build documentation (reusable)"

on:
  workflow_call:
    inputs:
      branch:
        description: "Logical branch used for version detection and deploy folder mapping (e.g. master, stable34)."
        required: true
        type: string
      ref:
        description: "Git ref to check out and build. Empty = default checkout (the caller's event ref, e.g. a PR merge)."
        required: false
        type: string
        default: ""
    outputs:
      branch_name:
        description: "Primary deploy folder name (latest / stable / <N>)."
        value: ${{ jobs.stage-and-check.outputs.branch_name }}
      additional_deployment:
        description: "Extra deploy folder for the highest stable (<N>), else empty."
        value: ${{ jobs.stage-and-check.outputs.additional_deployment }}
      artifact_name:
        description: "Name of the uploaded staged-docs artifact."
        value: ${{ jobs.stage-and-check.outputs.artifact_name }}

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================================
  # BUILD HTML
  # ============================================================================
  build-html:
    name: Building ${{ matrix.manual.name }} HTML
    runs-on: ubuntu-latest

    env:
      # The single-run deploy builds each version via a checked-out `ref`, but
      # GITHUB_REF stays the workflow's own branch. Stable branches' conf.py read
      # GITHUB_BASE_REF to derive their display version, so expose the branch being
      # built; otherwise every stable build is mislabelled as the dev version.
      GITHUB_BASE_REF: ${{ inputs.branch }}

    strategy:
      fail-fast: false
      matrix:
        manual:
          - name: "user_manual"
            directory: "user_manual"
            make_target: "html"
            build_path: "_build/html"
            publish: true

          - name: "user_manual-en"
            directory: "user_manual"
            make_target: "html-lang-en"
            build_path: "_build/html"
            publish: false

          - name: "developer_manual"
            directory: "developer_manual"
            make_target: "html"
            build_path: "_build/html/com"
            publish: true

          - name: "admin_manual"
            directory: "admin_manual"
            make_target: "html"
            build_path: "_build/html/com"
            publish: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Get stable branches
        id: stable_branches
        run: |
          branches=$(git ls-remote --heads origin "heads/stable[0-9][0-9]" \
            | awk '{gsub(/^refs\/heads\/stable/, "", $2); print $2}' \
            | sort -n -r | tr '\n' ' ')
          echo "branches=$branches" >> $GITHUB_OUTPUT

      - name: Setup PHP for version detection
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2

      - name: Detect and export version constants
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Detect current highest released stable and lowest supported stable via
          # GitHub API (same logic as build/build-index.php and generate-top-index.yml).
          # Exports DOCS_VERSION_STABLE and DOCS_VERSION_START so conf.py always has
          # accurate values without manual updates to any branch.
          eval $(php build/detect-versions.php ${{ steps.stable_branches.outputs.branches }})
          echo "DOCS_VERSION_STABLE=$highest_stable" >> $GITHUB_ENV
          echo "DOCS_VERSION_START=$lowest_stable"   >> $GITHUB_ENV

          # Compute display version: branch number for stableNN builds, dev version for master.
          branch="${{ inputs.branch }}"
          if [[ "$branch" =~ ^stable([0-9]+)$ ]]; then
            echo "DOCS_DISPLAY_VERSION=${BASH_REMATCH[1]}" >> $GITHUB_ENV
          else
            echo "DOCS_DISPLAY_VERSION=$((highest_stable + 1))" >> $GITHUB_ENV
          fi

      - name: Validate conf.py fallbacks are current
        if: inputs.branch == 'master'
        run: |
          conf_stable=$(grep -m1 "os.environ.get('DOCS_VERSION_STABLE'" conf.py | grep -o '[0-9]\+')
          conf_start=$(grep -m1  "os.environ.get('DOCS_VERSION_START'"  conf.py | grep -o '[0-9]\+')
          err=0
          if [ "$DOCS_VERSION_STABLE" != "$conf_stable" ]; then
            echo "::error::conf.py fallback version_stable ($conf_stable) != current highest stable ($DOCS_VERSION_STABLE). Update the fallback in conf.py."
            err=1
          fi
          if [ "$DOCS_VERSION_START" != "$conf_start" ]; then
            echo "::error::conf.py fallback version_start ($conf_start) != current lowest stable ($DOCS_VERSION_START). Update the fallback in conf.py."
            err=1
          fi
          exit $err

      - name: Resolve Python version
        id: pyver
        run: |
          # Read the version from the checked-out branch (ref input) so each
          # version builds with its own Python; fall back to 3.13 if absent.
          if [ -f .python-version ]; then
            echo "version=$(tr -d '[:space:]' < .python-version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=3.13" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ steps.pyver.outputs.version }}
          cache: "pip"

      - name: Install pip dependencies
        run: python -m pip install -r requirements.txt

      - name: Build html documentation
        run: cd ${{ matrix.manual.directory }} && make ${{ matrix.manual.make_target }}

      - name: Upload static documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ matrix.manual.publish }}
        with:
          # Namespaced by branch so several versions can build in one run (the
          # deploy matrix) without artifact-name collisions. Prefix is stripped
          # again in the stage-and-check "organize" step.
          name: ${{ inputs.branch }}__${{ matrix.manual.name }}
          path: ${{ matrix.manual.directory }}/${{ matrix.manual.build_path }}

  # ============================================================================
  # BUILD EPUB
  # ============================================================================
  build-epub:
    name: Building ${{ matrix.manual.name }} ePub
    runs-on: ubuntu-latest

    env:
      GITHUB_BASE_REF: ${{ inputs.branch }}

    strategy:
      fail-fast: false
      matrix:
        manual:
          - name: "user_manual"
            directory: "user_manual"
            build_epub_path: "_build/epub/Nextcloud_User_Manual.epub"

          - name: "admin_manual"
            directory: "admin_manual"
            build_epub_path: "_build/epub/Nextcloud_Server_Administration_Manual.epub"

          - name: "developer_manual"
            directory: "developer_manual"
            build_epub_path: "_build/epub/Nextcloud_Developer_Manual.epub"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve Python version
        id: pyver
        run: |
          if [ -f .python-version ]; then
            echo "version=$(tr -d '[:space:]' < .python-version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=3.13" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ steps.pyver.outputs.version }}
          cache: "pip"

      - name: Install pip dependencies
        run: python -m pip install -r requirements.txt

      - name: Build epub documentation
        run: |
          set -e
          cd ${{ matrix.manual.directory }}
          make epub
          ls -la ${{ matrix.manual.build_epub_path }}

      - name: Upload ePub documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.branch }}__${{ matrix.manual.name }}-epub
          path: ${{ matrix.manual.directory }}/${{ matrix.manual.build_epub_path }}

  # ============================================================================
  # PREPARE PDF IMAGE
  # ============================================================================
  prepare-pdf-image:
    name: Prepare PDF build image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.result.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 2

      - name: Check whether Dockerfile changed
        id: changed
        run: |
          if git diff --name-only HEAD^ HEAD -- .devcontainer/Dockerfile 2>/dev/null | grep -q .; then
            echo "dockerfile_changed=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.changed.outputs.dockerfile_changed == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        if: steps.changed.outputs.dockerfile_changed == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image with SHA tag
        if: steps.changed.outputs.dockerfile_changed == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .devcontainer
          push: true
          tags: ghcr.io/${{ github.repository }}/sphinx-latex:sha-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/sphinx-latex:latest
          cache-to: type=inline

      - name: Output image reference
        id: result
        run: |
          if [ "${{ steps.changed.outputs.dockerfile_changed }}" = "true" ]; then
            echo "image=ghcr.io/${{ github.repository }}/sphinx-latex:sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "image=ghcr.io/${{ github.repository }}/sphinx-latex:latest" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # BUILD PDF
  # ============================================================================
  build-pdf:
    name: Building ${{ matrix.manual.name }} PDF
    runs-on: ubuntu-latest
    needs: prepare-pdf-image
    container: ${{ needs.prepare-pdf-image.outputs.image }}

    env:
      GITHUB_BASE_REF: ${{ inputs.branch }}

    strategy:
      fail-fast: false
      matrix:
        manual:
          - name: "user_manual"
            directory: "user_manual"
            build_pdf_path: "_build/latex/Nextcloud_User_Manual.pdf"

          - name: "admin_manual"
            directory: "admin_manual"
            build_pdf_path: "_build/latex/Nextcloud_Server_Administration_Manual.pdf"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve Python version
        id: pyver
        run: |
          if [ -f .python-version ]; then
            echo "version=$(tr -d '[:space:]' < .python-version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=3.13" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ steps.pyver.outputs.version }}
          # pip cache is not compatible with the Docker container
          # cache: "pip"

      - name: Install pip dependencies
        run: python -m pip install -r requirements.txt

      - name: Compute PDF release version
        id: pdf_version
        shell: bash
        run: |
          branch="${{ inputs.branch }}"
          if [[ "$branch" =~ ^stable([0-9]+)$ ]]; then
            echo "release=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            # master: derive the dev version from conf.py.
            version_stable=$(grep -m1 '^\s*version_stable\s*=' conf.py | grep -o '[0-9]\+')
            echo "release=$((version_stable + 1))" >> $GITHUB_OUTPUT
          fi

      - name: Build pdf documentation
        env:
          DOCS_RELEASE: ${{ steps.pdf_version.outputs.release }}
        run: |
          set -e
          cd ${{ matrix.manual.directory }}
          make latexpdf
          ls -la ${{ matrix.manual.build_pdf_path }}

      - name: Upload PDF documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.branch }}__${{ matrix.manual.name }}-pdf
          path: ${{ matrix.manual.directory }}/${{ matrix.manual.build_pdf_path }}

  # ============================================================================
  # STAGE AND VALIDATE
  # ============================================================================
  # Organizes build artifacts into a per-version folder and uploads a single
  # staged-docs-<branch> artifact for the deploy job. Does NOT modify gh-pages.
  # ============================================================================
  stage-and-check:
    name: Stage and check documentation
    needs: [build-html, build-pdf, build-epub]
    runs-on: ubuntu-latest

    outputs:
      branch_name: ${{ steps.branch.outputs.branch_name }}
      additional_deployment: ${{ steps.branch.outputs.additional_deployment }}
      artifact_name: ${{ steps.branch.outputs.artifact_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Download this branch's build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # Only this version's artifacts — other matrix legs use a different prefix.
          pattern: ${{ inputs.branch }}__*
          path: artifacts/

      # ========================================================================
      # DETERMINE DEPLOYMENT TARGETS (branch_name and version_name)
      # ========================================================================
      #    master → branch_name=latest (no version_name)
      #    stable<N> where N is highest → branch_name=stable, additional=<N>
      #    stable<N> where N is not highest → branch_name=<N>
      #    Any other branch → branch_name=<branch>
      # ========================================================================
      - name: Determine deployment targets (branch_name and version_name)
        id: branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Logical branch to deploy is passed in explicitly by the caller.
          current_branch="${{ inputs.branch }}"

          # Find the highest numbered stable branch that has a v{N}.0.0 release.
          # Mirrors the is_version_released() check in build/build-index.php:
          # a branch whose first release doesn't exist yet (e.g. RC-only) is skipped.
          highest_stable=""
          for n in $(git ls-remote --heads origin | sed -n 's?.*refs/heads/stable\([0-9]\{2\}\)$?\1?p' | sort -n -r); do
            # Nextcloud moved to nextcloud-releases/server starting with v32
            if [ "$n" -ge 32 ]; then
              repo="nextcloud-releases/server"
            else
              repo="nextcloud/server"
            fi
            http_status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${repo}/releases/tags/v${n}.0.0")
            if [ "$http_status" = "200" ]; then
              highest_stable="$n"
              echo "stable${n}: v${n}.0.0 released — using as highest stable"
              break
            else
              echo "stable${n}: v${n}.0.0 not released yet (HTTP ${http_status}) — skipping"
            fi
          done

          if [ -z "$highest_stable" ]; then
            echo "ERROR: No released stable branch found"
            exit 1
          fi
          highest_stable_branch="stable${highest_stable}"

          echo "Current branch: $current_branch"
          echo "Highest released stable branch: $highest_stable_branch"

          # Map branch to deployment folder names
          case "$current_branch" in
            "master")
              echo "branch_name=latest" >> $GITHUB_OUTPUT
              ;;
            "$highest_stable_branch")
              echo "branch_name=stable" >> $GITHUB_OUTPUT
              echo "additional_deployment=${highest_stable}" >> $GITHUB_OUTPUT
              ;;
            *)
              branch_for_deploy="${current_branch#stable}"
              echo "branch_name=$branch_for_deploy" >> $GITHUB_OUTPUT
              ;;
          esac

          # Artifact name is unique per version so the deploy job can download
          # every version's staged output together (pattern staged-docs-*).
          echo "artifact_name=staged-docs-${current_branch}" >> $GITHUB_OUTPUT

      - name: Log deployment targets
        run: |
          echo "Deployment target folder: ${{ steps.branch.outputs.branch_name }}"
          echo "Additional deployment folder (if applicable): ${{ steps.branch.outputs.additional_deployment }}"
          echo "Artifact name: ${{ steps.branch.outputs.artifact_name }}"

      # ========================================================================
      # ORGANIZE ARTIFACTS FOR DEPLOYMENT
      # ========================================================================
      # Stage into stage/<branch_name>/. When this is the highest stable branch,
      # ALSO stage into stage/<additional>/ so a single artifact carries both the
      # server/stable/ and server/<N>/ deployments and the deploy job can stay
      # version-agnostic (it just applies every folder it finds).
      # ========================================================================
      - name: Organize artifacts for deployment
        id: organize
        run: |
          branch="${{ steps.branch.outputs.branch_name }}"
          additional="${{ steps.branch.outputs.additional_deployment }}"

          mkdir -p "stage/${branch}"

          # Artifacts are named "<inputs.branch>__<manual>[-epub|-pdf]"; strip that
          # prefix so the deployed folders are just user_manual/admin_manual/etc.
          prefix="${{ inputs.branch }}__"

          # Copy artifacts preserving their manual folder structure
          for artifact in artifacts/*; do
            if [ -d "$artifact" ]; then
              manual_name="$(basename "$artifact")"
              manual_name="${manual_name#$prefix}"
              mkdir -p "stage/${branch}/${manual_name}"
              cp -r "$artifact/"* "stage/${branch}/${manual_name}/"
            fi
          done

          # Move PDF and ePub files to the root of the branch folder
          echo "Looking for PDF and ePub files to move..."
          find "stage/${branch}/" -maxdepth 2 \( -name "*.pdf" -o -name "*.epub" \) -type f
          for f in "stage/${branch}"/*/*.pdf "stage/${branch}"/*/*.epub; do
            if [ -f "$f" ]; then
              echo "Moving: $f"
              mv "$f" "stage/${branch}/"
            fi
          done

          # Duplicate into the additional versioned folder for the highest stable.
          if [ -n "${additional}" ]; then
            rm -rf "stage/${additional}"
            cp -r "stage/${branch}" "stage/${additional}"
          fi

          # Clean up empty directories
          find stage -type d -empty -delete

          echo "Staged artifacts:"
          find stage -type f | head -20

      - name: Upload staged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.branch.outputs.artifact_name }}
          path: stage/
          retention-days: 1
